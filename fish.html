<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>דף דג</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="data/pool_legends.js"></script>
<script src="data/glass_tanks.js"></script>
<script src="data/world_monsters.js"></script>
<script src="data/ancient_survivors.js"></script>
<script src="data/fish_filters.js"></script>
<script src="data/scientific_sources.js"></script>
<script src="data/taxonomy.js"></script>
<script src="data/encyclopedia_fields.js"></script>
<script src="data/discoverers.js"></script>
</head>
<body class="bg-slate-950 text-white">

<div id="app" class="max-w-5xl mx-auto p-6"></div>

<div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
  <img id="modalImg" class="max-w-full max-h-full rounded-xl" />
</div>

<script>
const fish=[...(window.fishData_PoolLegends||[]),...(window.fishData_GlassTanks||[]),...(window.fishData_WorldMonsters||[]),...(window.fishData_AncientSurvivors||[])];
const params=new URLSearchParams(location.search);
const f=fish.find(x=>String(x.id)===params.get('id'))||fish[0];

function openModal(src){
 document.getElementById('modalImg').src=src;
 document.getElementById('modal').classList.remove('hidden');
}

document.getElementById('modal').onclick=()=>document.getElementById('modal').classList.add('hidden');

const p=f.encyclopediaProfile||{};

document.getElementById('app').innerHTML=`
<a href="index.html" class="text-sky-400">← חזרה</a>

<h1 class="text-4xl font-black mt-4 mb-2">${f.name}</h1>
<p class="italic text-sky-400 mb-4">${f.scientificName}</p>

<img src="${f.image}" onclick="openModal('${f.image}')" class="w-full rounded-xl cursor-zoom-in mb-6" />

<div class="space-y-6 text-lg">
<div><b>אטימולוגיה:</b> ${p.etymologyFull}</div>
<div><b>מגלה:</b> ${p.discovererDetails}</div>
<div><b>שנה:</b> ${p.discoveryYear}</div>
<div><b>מיקום גילוי:</b> ${p.discoveryLocation}</div>
<div><b>נסיבות גילוי:</b> ${p.discoveryCircumstances}</div>
<div><b>מידות:</b> ${p.measurements}</div>
<div><b>תזונה:</b> ${p.diet}</div>
</div>
`;
</script>

</body>
</html>
