<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ענקי המים - אנציקלופדיה מדעית</title>
<script src="https://cdn.tailwindcss.com"></script>

<script src="data/pool_legends.js"></script>
<script src="data/glass_tanks.js"></script>
<script src="data/world_monsters.js"></script>
<script src="data/ancient_survivors.js"></script>
<script src="data/scientific_sources.js"></script>
<script src="data/taxonomy.js"></script>
</head>

<body class="bg-slate-950 text-white">
<div class="max-w-6xl mx-auto p-6">
<h1 class="text-4xl font-black mb-8 text-center text-sky-400">ענקי המים</h1>

<div id="fishList" class="grid md:grid-cols-2 gap-6"></div>
</div>

<script>
const fish = [
...(window.fishData_PoolLegends||[]),
...(window.fishData_GlassTanks||[]),
...(window.fishData_WorldMonsters||[]),
...(window.fishData_AncientSurvivors||[])
];

const container = document.getElementById('fishList');

fish.forEach(f=>{
const el = document.createElement('div');
el.className = 'bg-slate-900 p-4 rounded-2xl border border-slate-800';

el.innerHTML = `
<h2 class="text-xl font-bold">${f.name}</h2>
<p class="italic text-sky-400">${f.scientificName}</p>

${f.taxonomy ? `
<div class="mt-2 text-sm text-slate-300">
<b>סיווג:</b> ${f.taxonomy.order} → ${f.taxonomy.family}
</div>`:''}

<div class="mt-3">
<b>מקורות:</b>
<ul class="text-sm text-sky-300">
${(f.sources||[]).map(s=>`<li><a href="${s}" target="_blank">${s}</a></li>`).join('')}
</ul>
</div>
`;

container.appendChild(el);
});
</script>
</body>
</html>
