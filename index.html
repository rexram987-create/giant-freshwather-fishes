<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ענקי המים - האנציקלופדיה המודולרית V25.3</title>

    <script>
        window.addEventListener('error', function(event) {
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background-color:#7f1d1d;color:white;padding:20px;z-index:99999;overflow-y:auto;direction:ltr;font-family:monospace;';
            errorDiv.innerHTML = '<h2>System Crash</h2>' + event.message;
            document.body.appendChild(errorDiv);
        });
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="data/pool_legends.js"></script>
    <script src="data/glass_tanks.js"></script>
    <script src="data/world_monsters.js"></script>
    <script src="data/ancient_survivors.js"></script>
    <script src="data/scientific_sources.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const App = () => {
  const [fish] = useState([
    ...(window.fishData_PoolLegends||[]),
    ...(window.fishData_GlassTanks||[]),
    ...(window.fishData_WorldMonsters||[]),
    ...(window.fishData_AncientSurvivors||[])
  ]);

  return (
    <div className="p-6 text-white">
      <h1 className="text-3xl font-bold mb-6">ענקי המים</h1>
      {fish.map(f => (
        <div key={f.id} className="mb-6 border p-4 rounded">
          <h2 className="text-xl font-bold">{f.name}</h2>
          <p className="italic">{f.scientificName}</p>
          <div className="mt-2">
            <b>מקורות:</b>
            <ul>
              {(f.sources||[]).map((s,i)=>(<li key={i}><a href={s} target="_blank">{s}</a></li>))}
            </ul>
          </div>
        </div>
      ))}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
