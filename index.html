<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ענקי המים - אנציקלופדיה מדעית</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data/pool_legends.js"></script>
  <script src="data/glass_tanks.js"></script>
  <script src="data/world_monsters.js"></script>
  <script src="data/ancient_survivors.js"></script>
  <script src="data/fish_filters.js"></script>
  <script src="data/scientific_sources.js"></script>
  <script src="data/taxonomy.js"></script>
  <script src="data/encyclopedia_fields.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800;900&display=swap');
    body { font-family: 'Assistant', sans-serif; }
    .region-tab.active {
      background: rgba(14, 165, 233, 0.18);
      border-color: rgba(56, 189, 248, 0.55);
      color: #7dd3fc;
      box-shadow: 0 0 24px rgba(56, 189, 248, 0.10);
    }
  </style>
</head>
<body class="bg-slate-950 text-white">
  <main class="max-w-7xl mx-auto p-6">
    <header class="text-center mb-8">
      <h1 class="text-4xl md:text-6xl font-black mb-4 text-sky-400">ענקי המים</h1>
      <p class="text-slate-300 text-lg max-w-3xl mx-auto leading-relaxed">
        אנציקלופדיה מדעית לדגי ענק — עם חלוקה לפי אזורים גיאוגרפיים.
      </p>
      <div class="flex flex-wrap justify-center gap-3 mt-6">
        <a href="admin.html" class="px-5 py-2 rounded-full bg-sky-500/10 border border-sky-400/20 text-sky-300 font-bold hover:bg-sky-500/20">מערכת ניהול</a>
        <a href="sources.html" class="px-5 py-2 rounded-full bg-emerald-500/10 border border-emerald-400/20 text-emerald-300 font-bold hover:bg-emerald-500/20">מקורות</a>
        <a href="related.html" class="px-5 py-2 rounded-full bg-amber-500/10 border border-amber-400/20 text-amber-300 font-bold hover:bg-amber-500/20">קשרים בין דגים</a>
      </div>
    </header>

    <section class="mb-8 bg-slate-900/70 border border-slate-800 rounded-3xl p-4 md:p-5">
      <h2 class="text-xl font-black text-white mb-4 text-center">סינון לפי אזור גיאוגרפי</h2>
      <div id="regionTabs" class="flex flex-wrap justify-center gap-2"></div>
    </section>

    <section id="regionInfo" class="mb-8 text-center text-slate-300"></section>
    <section id="fishList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></section>
  </main>

<script>
const fish = [
  ...(window.fishData_PoolLegends || []),
  ...(window.fishData_GlassTanks || []),
  ...(window.fishData_WorldMonsters || []),
  ...(window.fishData_AncientSurvivors || [])
];

const regions = [
  { id: 'all', label: 'כל האזורים', emoji: '🌍', terms: [] },
  { id: 'amazon', label: 'אמזונס ואורינוקו', emoji: '🌿', terms: ['אמזונס', 'אורינוקו', 'דרום אמריקה', 'ברזיל', 'פרו', 'גיאנה'] },
  { id: 'north-america', label: 'צפון אמריקה', emoji: '🦬', terms: ['צפון אמריקה', 'מיסיסיפי', 'ארה"ב', 'ארצות הברית', 'אמריקה'] },
  { id: 'asia', label: 'אסיה', emoji: '🐉', terms: ['אסיה', 'הודו', 'תאילנד', 'סיאם', 'מקונג', 'דרום מזרח אסיה', 'דרום אסיה', 'אינדונזיה'] },
  { id: 'africa', label: 'אפריקה', emoji: '🌍', terms: ['אפריקה', 'קונגו'] },
  { id: 'europe', label: 'אירופה', emoji: '🏰', terms: ['אירופה'] },
  { id: 'indo-pacific', label: 'אינדו־פסיפי ואוסטרליה', emoji: '🌊', terms: ['אינדו-פסיפי', 'אינדו־פסיפי', 'אוסטרליה', 'צפון אוסטרליה'] },
  { id: 'unknown', label: 'אחר / לא מסווג', emoji: '❔', terms: [] }
];

let activeRegion = 'all';

function safe(value) {
  return String(value || '').replace(/[&<>"]/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;'}[ch]));
}

function regionOf(f) {
  const origin = String(f.origin || '').toLowerCase();
  for (const region of regions) {
    if (region.id === 'all' || region.id === 'unknown') continue;
    if (region.terms.some(term => origin.includes(term.toLowerCase()))) return region.id;
  }
  return 'unknown';
}

function filteredFish() {
  if (activeRegion === 'all') return fish;
  return fish.filter(f => regionOf(f) === activeRegion);
}

function renderTabs() {
  const tabs = document.getElementById('regionTabs');
  tabs.innerHTML = regions.map(region => {
    const count = region.id === 'all' ? fish.length : fish.filter(f => regionOf(f) === region.id).length;
    return `
      <button class="region-tab ${activeRegion === region.id ? 'active' : ''} px-4 py-2 rounded-full border border-slate-700 bg-slate-950 text-slate-300 font-bold hover:border-sky-400 transition" data-region="${region.id}">
        <span>${region.emoji}</span> ${region.label}
        <span class="text-xs opacity-70">(${count})</span>
      </button>
    `;
  }).join('');

  document.querySelectorAll('.region-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeRegion = btn.dataset.region;
      render();
    });
  });
}

function renderCards(list) {
  const container = document.getElementById('fishList');
  container.innerHTML = list.map(f => {
    const taxonomy = f.taxonomy || {};
    return `
      <a href="fish.html?id=${encodeURIComponent(f.id)}" class="block bg-gradient-to-br from-slate-900 to-slate-950 p-5 rounded-3xl border border-slate-800 hover:border-sky-400/60 hover:-translate-y-1 transition shadow-xl">
        <div class="h-48 rounded-2xl overflow-hidden bg-slate-800 mb-4">
          <img src="${safe(f.image)}" alt="${safe(f.name)}" class="w-full h-full object-cover" loading="lazy" onerror="this.style.display='none'" />
        </div>
        <h2 class="text-2xl font-black text-white mb-1">${safe(f.name)}</h2>
        <p class="italic text-sky-400 font-bold mb-3" dir="ltr">${safe(f.scientificName)}</p>
        <div class="text-sm text-slate-300 space-y-1">
          <div><b class="text-sky-300">אזור:</b> ${safe(f.origin || 'לא צוין')}</div>
          <div><b class="text-sky-300">משפחה:</b> <span dir="ltr">${safe(taxonomy.family || 'להשלים')}</span></div>
          <div><b class="text-sky-300">תזונה:</b> ${safe(f.diet || 'להשלים')}</div>
        </div>
        <div class="mt-4 text-sm text-slate-400">לחץ לערך מלא ←</div>
      </a>
    `;
  }).join('') || `<div class="col-span-full text-center text-slate-400 text-2xl py-16">לא נמצאו דגים באזור זה</div>`;
}

function renderInfo(list) {
  const region = regions.find(r => r.id === activeRegion);
  document.getElementById('regionInfo').innerHTML = `
    <div class="inline-flex px-5 py-2 rounded-full bg-slate-900 border border-slate-800">
      מציג כעת: <b class="mx-2 text-sky-300">${region.emoji} ${region.label}</b> — ${list.length} מינים
    </div>
  `;
}

function render() {
  const list = filteredFish();
  renderTabs();
  renderInfo(list);
  renderCards(list);
}

render();
</script>
</body>
</html>
